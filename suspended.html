<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Site temporairement indisponible</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(rgba(6,6,8,0.85), rgba(6,6,8,0.95)),
      url('images/van_paysage.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .container {
      backdrop-filter: blur(10px);
      background: rgba(18,18,26,0.6);
      padding: 40px 30px;
      border-radius: 16px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .title {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #8B5CF6;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .desc {
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .contact {
      font-size: 0.85rem;
      color: #666;
    }

    .contact span {
      color: #8B5CF6;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="icon">⏸</div>
  <div class="title">ATS Chauffeur</div>

  <h1>Site temporairement indisponible</h1>

  <p class="desc">
    Ce service est actuellement suspendu.<br>
    Pour toute demande ou information, veuillez contacter votre prestataire.
  </p>

  <p class="contact">
    Assistance : <span>azmat.chwt@gmail.com</span>
  </p>
</div>

</body>
</html>
